<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abunawas Kasir Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-shell" aria-label="Halaman login kasir Abunawas">
      <div class="visual-panel" aria-hidden="true">
        <div class="grid-bg"></div>
        <div class="floor-grid"></div>
        <canvas id="creatureCanvas"></canvas>
        <div class="visual-glow"></div>
        <div class="visual-copy">
          <p class="mini-label">CYBER CASHIER ACCESS</p>
          <h1>KasirKu Neon</h1>
          <p>Gerakkan mouse atau sentuh layar. Hewan neon akan ikut arah cursor.</p>
        </div>
      </div>

      <div class="login-panel">
        <div class="brand">
          <div class="brand-icon">A</div>
          <h2>Abunawas</h2>
          <p>Percetakan & Konveksi</p>
          <span>Digital Printing + AI Powered</span>
        </div>

        <form id="loginForm" class="login-card" autocomplete="off">
          <div class="card-head">
            <p>Secure Access</p>
            <h3>Akses Karyawan</h3>
            <span>Silakan masuk untuk mengakses sistem kasir.</span>
          </div>

          <div class="role-row" aria-label="Pilih role demo cepat">
            <button class="role-btn active" type="button" data-user="owner" data-pass="owner123">
              <strong>BO</strong>
              <span>Owner</span>
            </button>
            <button class="role-btn" type="button" data-user="admin" data-pass="admin123">
              <strong>AD</strong>
              <span>Admin</span>
            </button>
            <button class="role-btn" type="button" data-user="kasir" data-pass="kasir123">
              <strong>KS</strong>
              <span>Kasir</span>
            </button>
          </div>

          <label class="field" for="username">
            <span>Username</span>
            <input id="username" name="username" type="text" placeholder="Ketik username..." inputmode="text" />
          </label>

          <label class="field" for="password">
            <span>Password</span>
            <input id="password" name="password" type="password" placeholder="Ketik password..." />
          </label>

          <div class="form-options">
            <label class="remember">
              <input type="checkbox" />
              <span>Remember me</span>
            </label>
            <a href="#" draggable="false">Forgot?</a>
          </div>

          <button class="login-btn" type="submit">Masuk ke Sistem</button>
          <p id="status" class="status" role="status" aria-live="polite"></p>
        </form>

        <a class="public-link" href="#katalog" draggable="false">▦ Buka Katalog Harga Publik</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
