<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Creature Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="login-stage" aria-label="Login page dengan hewan neon interaktif">
      <div class="grid grid-back"></div>
      <div class="grid grid-floor"></div>
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>

      <!-- Area hiburan: hewan neon berada di sini dan ikut arah mouse/touch -->
      <div class="creature-window" aria-hidden="true">
        <canvas id="creatureCanvas"></canvas>
        <div class="window-glow"></div>
        <div class="window-border"></div>
        <p class="hint">Gerakin mouse / sentuh layar ✦</p>
      </div>

      <form class="login-card" id="loginForm" autocomplete="off">
        <div class="card-glow"></div>
        <p class="label-top">SYSTEM ACCESS</p>
        <h1>SIGN IN</h1>

        <label class="field">
          <span>Username</span>
          <input id="username" type="text" placeholder="Masukkan username" />
        </label>

        <label class="field">
          <span>Password</span>
          <input id="password" type="password" placeholder="Masukkan password" />
        </label>

        <button type="submit">LOGIN</button>
        <p class="status" id="status" role="status"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
