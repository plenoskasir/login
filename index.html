<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Login Creature</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="login-scene" aria-label="Halaman login neon">
      <canvas id="creatureCanvas" aria-hidden="true"></canvas>
      <div class="grid-bg"></div>
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>
      <div class="scan-line"></div>

      <div class="login-card">
        <div class="card-shine"></div>
        <p class="eyebrow">SECURE ACCESS</p>
        <h1>SIGN IN</h1>
        <p class="mini-copy">Gerakin mouse / sentuh layar, hewan neon-nya ikut arah.</p>

        <form id="loginForm" autocomplete="off">
          <label>
            <span>Username</span>
            <input id="username" type="text" placeholder="Masukkan username" />
          </label>

          <label>
            <span>Password</span>
            <input id="password" type="password" placeholder="Masukkan password" />
          </label>

          <div class="form-row">
            <label class="remember">
              <input type="checkbox" />
              <span>Remember me</span>
            </label>
            <a href="#">Forgot?</a>
          </div>

          <button type="submit">LOGIN</button>
          <p id="message" class="message" role="status"></p>
        </form>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
